<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Session Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-header">
            <h1>Session Viewer</h1>
            <div class="sidebar-actions">
              <label class="font-size-control" for="languageSelect">
                <span id="languageLabel">Language</span>
                <select id="languageSelect">
                  <option value="en" selected>English</option>
                  <option value="zh-CN">简体中文</option>
                </select>
              </label>
              <button id="refreshBtn" class="btn">Refresh</button>
            </div>
          </div>
          <p id="rootPath" class="subtle"></p>
        </div>
        <div id="sessionTree" class="session-tree sidebar-scroll"></div>
      </aside>

      <main class="content">
        <header class="content-header">
          <div>
            <h2 id="contentTitle">Select a session file from the left panel</h2>
            <p id="contentMeta" class="subtle"></p>
          </div>
          <div class="view-mode">
            <label class="font-size-control" for="viewSelect">
              <span id="viewLabel">View</span>
              <select id="viewSelect">
                <option id="viewOptionSession" value="session" selected>Session View</option>
                <option id="viewOptionThinking" value="thinking">Thinking View</option>
                <option id="viewOptionTree" value="tree">Tree View</option>
                <option id="viewOptionRaw" value="raw">Raw Text</option>
              </select>
            </label>
            <label class="font-size-control" for="fontSizeSelect">
              <span id="fontSizeLabel">Font</span>
              <select id="fontSizeSelect">
                <option id="fontSizeOptionSmall" value="small">Small</option>
                <option id="fontSizeOptionMedium" value="medium" selected>Medium</option>
                <option id="fontSizeOptionLarge" value="large">Large</option>
              </select>
            </label>
          </div>
        </header>

        <section id="notice" class="notice">
          Session files are grouped by agent in the left panel. Click one to inspect structured content and raw text on the right.
        </section>

        <section id="sessionView" class="pane"></section>
        <section id="thinkingView" class="pane hidden"></section>
        <section id="treeView" class="pane hidden"></section>
        <section id="rawView" class="pane hidden">
          <div id="rawText"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
